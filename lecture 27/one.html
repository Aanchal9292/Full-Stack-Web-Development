<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            box-sizing: border-box;
        }
        .container{
            width: 100vw;
            height: 100vh;
            background-color: #68dddd;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card{
            width: 400px;
            height: 600px;
            border-radius: 20px;
            background-color: azure;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            /* padding: 20px; */

        }
        .card img{
            width: 100%;
            height: 40%;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }
        .textBox{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 70%;
            text-align: center;
        }
        
        .amountBox{
            background-color: lightblue;
            border: white;
            border-radius: 10px;
            height: 15%;
            width: 90%;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            padding-right: 20px;
            padding-left: 20px;

        }
        #leftBox{
            width: 60%;
            height: 100%;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
        }
        /* .rightbox{
            width: 40%;
            display: flex;
            justify-content: center;
            align-items: center;
        } */
        .leftbox img{
            height: 30px;
            width: 20%;
            border-radius: none;
         }
        .box{
          line-height:2px;
        }
        #payment{
            background-color: rgb(15, 15, 119);
            color: azure;
            border-radius: 10px;
            height: 10%;
            width: 78%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.19), 0,6px,6px rgba(0,0,0,0.23);
        }

        .cancelBox a{
            text-decoration: none;
            color: rgb(80, 89, 97);
            font-weight: bold;
            font-size: large;
        }


    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="Image.jpeg" >
            <div class="textBox">
                <h2>Order Summary</h2>
            <p>
                Lorem ipsum dolor sit, amet consectetur adipisicing elit. Autem ducimus doloribus ullam aliquid esse. Cupiditate!
            </p>
            <div class="amountBox">

                <div id="leftBox">
                    <div id="image">
                        <img src="Barfi.jpeg" >
                       
                    </div>
                    <div class="box">
                        <p>Annual plan</p>
                        <p>$99/year</p>
                    </div>
                    
                        
                    

                </div>
                <div class="rightBox">
                    <a href="#">Change</a>
                </div>
            </div>
             <button id="payment">
                Proceed to payment
            </button >
            <div class="cancelBox">
                <a href="#">Cancel Order</a>

            </div>
            
        </div>
        

    </div>
</body>
</html>
