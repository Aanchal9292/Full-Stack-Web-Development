<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card 1</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }
        .container{
            width: 100vw;
            height: 100vh;
            background-color: #68dddd;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card{
            width: 400px;
            height: 600px;
            border-radius: 20px;
            background-color: azure;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 25px;
            padding: 20px;

        }
        .card img{
            height: 65%;
            width: 90%;
            border-radius: 10px;
            

        }
        .card h2{
           font-size: 1.8rem;
           font-weight: 700;
            
        }
        .card p{
            font-size: 1.2rem;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="Barfi.jpeg" >
            <h2>This is the picture of barfi</h2>
            <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Aliquid ipsum velit nisi perferendis autem repellendus?</p>
        </div>
    </div>
</body>
</html>
