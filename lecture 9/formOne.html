<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form One</title>
</head>
<body>
    <h2>Event Registration</h2>
    <form>
        <label for="name">Name : </label>
        <input type="text" id="name" name="name">
        <br/><br/>
        <label for="email">Email ID : </label>
        <input type="text" id="email" name="email" placeholder="name@123">
        <br/><br/>
        <label for="phoneno">Phone : </label>
        <input type="tel" id="phoneno" name="phoneno">
        <br/><br/>
        <label for="occuption">Occupation : </label>
        <select name="occupation" id="occupation">
            <option value="Select">Select</option>
            <option value="Student">Student</option>
            <option value="Professional">Professional</option>
            <option value="other">Other</option>
        </select>
        <br/><br/>
        <fieldset>
            <legend>Topics of Interest</legend>
            <label for="checkbox1">HTML</label>
            <input type="checkbox" name="checkbox1" id="checkbox1">
            <label for="checkbox2">CSS</label>
            <input type="checkbox" name="checkbox2" id="checkbox2">
            <label for="checkbox3">JavaScript</label>
            <input type="checkbox" name="checkbox3" id="checkbox3">
            
        </fieldset>
        <br/><br/>
        <label for="textarea1">Comment : </label>
        <textarea name="textarea1" id="textarea1"></textarea>
        <input type="button" value="Register">
    </form>
    
</body>
</html>
