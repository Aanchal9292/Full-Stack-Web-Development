<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Two</title>
</head>
<body>
    <h2>Job Application</h2>
    <form>
        <label for="name">Name : </label>
        <input type="text" id="name" name="name">
        <br/><br/>
        <label for="email">Email ID : </label>
        <input type="text" id="email" name="email" placeholder="name@123">
        <br/><br/>
        <label for="phoneno">Phone : </label>
        <input type="tel" id="phoneno" name="phoneno">
        <br/><br/>
        <label for="file">Resume : </label>
        <input type="file" name="file" id="file">
        <label for="counter">Experience : </label>
        <input type="number" name="counter" id="counter" min="0" max="50">
    </form>
</body>
</html>
