<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Two</title>
</head>
<body>
    <h2>Job Application</h2>
    <form>
        <label for="name">Name : </label>
        <input type="text" id="name" name="name">
        <br/><br/>
        <label for="email">Email ID : </label>
        <input type="text" id="email" name="email" placeholder="name@123">
        <br/><br/>
        <label for="phoneno">Phone : </label>
        <input type="tel" id="phoneno" name="phoneno">
        <br/><br/>
        <label for="file">Resume : </label>
        <input type="file" name="file" id="file">
        <br/><br/>
        <label for="counter">Experience : </label>
        <input type="number" name="counter" id="counter" min="0" max="50">
        <br/><br/>
        <fieldset>
            <legend>Topics of Interest</legend>
            <label for="checkbox1">HTML</label>
            <input type="checkbox" name="checkbox1" id="checkbox1"><br/>
            <label for="checkbox2">CSS</label>
            <input type="checkbox" name="checkbox2" id="checkbox2"><br/>
            <label for="checkbox3">JavaScript</label>
            <input type="checkbox" name="checkbox3" id="checkbox3"><br/>
            
        </fieldset>
        <br/>
        <label for="qualification">Highest Qualification : </label>
        <br/>
        <select name="qualification" id="qualification">Select
            <option value="10th">10th</option>
            <option value="12th">12th</option>
            <option value="Graduate">Graduate</option>
        </select>
        <br/>
        <br/>
        <fieldset>
            
            <legend>Availability</legend>
            <label for="radio1">Full time</label>
            <input type="radio" name="radio" id="radio1">
            <br>
            <label for="radio2">Part time</label>
            <input type="radio" name="radio" id="radio2">
        </fieldset>
    </form>
</body>
</html>
