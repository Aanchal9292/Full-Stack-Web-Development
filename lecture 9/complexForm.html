<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complex Form</title>
</head>
<body>
    <h2>Complex Form</h2>
    <form >
        <fieldset>
            <legend>Personal Information</legend>
            <label for="nameofuser">Name</label>
            <input type="text" name="nameofuser" id="nameofuser">
            <label for="email">Email</label>
            <input type="text" name="email" id="email">
            <label for="phone">Phone</label>
            <input type="tel" name="phone" id="phone">
            <label for="dob">Date of Birth</label>
            <input type="date" name="dob" id="dob">
            <label for="gender">Gender</label>
            <input type="radio" name="radio" id="male">
            <label for="male">Male</label>
            <input type="radio" name="radio" id="female">
            <label for="female">Female</label>
            
            <label for="country">Country</label>
            <select name="country" id="country">
                <option value="select">Select</option>
                <option value="India">India</option>
                <option value="United States">United States</option>
                <option value="others">others</option>
            </select>
        </fieldset>
        <fieldset>
            <legend>Address Street</legend>
            <label for="address">Address</label>
            <input type="text" name="address" id="address">
            <label for="city">City</label>
            <input type="text" name="city" id="city">
            <label for="state">State</label>
            <input type="text" name="state" id="state">
            <label for="zipcode">Zip Code</label>
            <input type="text" name="zipcode" id="zipcode">
        </fieldset>
        <fieldset>
            <legend>Other Information</legend>
            <label for="comment">Comment</label>
            <textarea name="comment" id="comment" rows="3" cols="5"></textarea>
            <br/>
            <input type="checkbox" name="checkbox" id="checkbox">
            <label for="checkbox">I agree to the terms and conditions of  service</label>
        </fieldset>
        <input type="button" name="submit" value="Submit">
    </form>

</body>
</html>
