<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animations</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box ;
        }
        .container{
            height: 100vh;
            width: 100vw;
            background-color: beige;
            border: 5px solid black;
        }
        .box{
            width: 350px;
            height: 80px;
            background-color: blue;
            border-radius: 10px;
            margin: 10px;
            border: 3px solid yellow;
            position: relative;
            /* animation-name: rightMovement;
            animation-duration: 5s;
            animation-iteration-count: 2;
            animation-delay: 1s;
            animation-timing-function: linear;   */
             /* ease-in , ease-out , ease-in-out , cubic-bezier(0,0,0,0) */
            /* animation-timing-function: cubic-bezier(1, -0.7, 1.0, 1);  */
            /* animation-direction: alternate; */
            /* animation-fill-mode: forward; */
            /* @keyframes duration | easing-function | delay |
iteration-count | direction | fill-mode | play-state | name */
            animation: 5s linear 1s infinite alternate none running rightMovement;
        }
        @keyframes rightMovement {
            from{
                top: 0;
                left: 0;

            }
            to{
                top: 0;
                left: 1550px;
            }
        }
        #circle{
            width: 100px;
            height: 100px;
            background-color: rgb(30, 231, 164);
            border-radius: 100%;
            margin: 10px;
            border: 3px solid yellow;
            position: relative;
            top: 500px;
            left: 800px;
            animation: 10s ease-in-out 0s infinite alternate-reverse none running circleMovement;
        }
        @keyframes circleMovement {
            0%{
                top: 2%;
                left: 5%;

            }
            30%{
                top: 5%;
                left: 90%;
            }
            60%{
                top: 45%;
                left: 70%;
            }
            100%{
                top: 30%;
                left: 40%;
            }
        }
        #box2{
            width: 350px;
            height: 80px;
            background-color: blue;
            border-radius: 10px;
            margin: 10px;
            border: 3px solid yellow;
            position: relative;
            animation: 5s linear 1s infinite alternate none running leftMovement;
        }
        @keyframes leftMovement {
            from{
                top: 1000px;
                left: 1550px;

            }
            to{
                top: 1000px;
                left: 0px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">

        </div>
        <div id="circle"></div>
        <div id="box2"></div>

    </div>
</body>
</html>
