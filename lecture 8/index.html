<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form(input) in HTML</title>
</head>
<body>
    <form>
        <label for="email">Enter Email ID : </label>
        <input type="text" name="emailid" id="email" placeholder="name@123">
        <br>
        <br>
        <label for="password">Password : </label>
        <input type="password" id="password" >
        <br><br>
        <label for="button1">Button :</label>
        <input type="submit" name="button1" value="Click">
        <br><br>
        <label for="radio1">RadioButton1: </label>
        <input type="radio" name="radio" id="radio1">
        <label for="radio2">RadioButton1: </label>
        <input type="radio" name="radio" id="radio2">
        <label for="radio3">RadioButton1: </label>
        <input type="radio" name="radio" id="radio3"><br/><br/>
        <label for="checkbox1">English: </label>
        <input type="checkbox" name="checkbox1" id="checkbox1">
        <label for="checkbox2">Hindi: </label>
        <input type="checkbox" name="checkbox2" id="checkbox2"><br/><br/>
        <label for="fileselect1">Choose File: </label>
        <input type="file" name="fileselect1" id="fileselect1"><br/><br/>
        <input type="image" name="image1" id="image1" src="arrow_image.jpeg" height="30px" alt="Click button">

    </form>
    
</body>
</html>
