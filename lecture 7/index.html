<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table in html</title>
</head>
<body>
    <h2>Table 1</h2>
    <table border="1">

        <thead>
            <th>Student id</th>
            <th>Name</th>
            <th>Age</th>
            <th>Gender</th>
        </thead>
        <tbody>
            <tr>
                <td>12</td>
                <td colspan="3">ABC</td>
                
            </tr>
            <tr>
                <td>17</td>
                <td>Xyz</td>
                <td>Male</td>
                <td rowspan="3">12</td>
            </tr>
            <tr>
                <td>13</td>
                <td>John</td>
                <td>Male</td>
                
            </tr>
            <tr>
                <td>15</td>
                <td>Alice</td>
                <td>Female</td>
                
            </tr>
        </tbody>
    </table>
    <h2>Table 2</h2>
    <table border="1">
        <tr>
            <td>Col1</td>
            <td>Col2</td>
            <td>Col3</td>
        </tr>
        <tr>
            <td rowspan="2">R1 Cell1</td>
            <td>R1 Cell2</td>
            <td>R1 Cell3</td>
        </tr>
        <tr>
            <td>R2 Cell2</td>
            <td>R2 Cell3</td>
        </tr>
        <tr>
            <td colspan="3">R3 Cell 1</td>
        </tr>
    </table>
</body>
</html>
