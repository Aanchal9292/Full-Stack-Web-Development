<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: flex;
            flex-direction: row;
            border: 2px solid black;
            background-color: bisque;
            width: 450px;
        }
        img{
            height: 200px;
            
        }
        #boxleft{
            background-color: aqua;
            border: 1px solid blue;
            width: 47%;
            margin: 3px;
            padding: 2px;
            display: flex;
            flex-direction: column;
        }
        #boxright{
            background-color: rgb(149, 255, 0);
            border: 1px solid green;
            width: 47%;
            margin: 3px;
            padding: 2px;
        }
        p{
            border: 1px solid rgb(224, 86, 86);
        }
        @media (min-width:640px){
            .container{
            flex-direction : row;
            }

        }
        @media (max-width:640px){
            .container{
            flex-direction : column;
            }

        }
    </style>
</head>
<body>
    <div class="container">
        <div id="boxleft">
            <p>Text1</p>
            <p>Text2</p>
        </div>
        <div id="boxright">
            <img src="BhagatSingh.jpeg" alt="image">
        </div>
    </div>
</body>
</html>
